<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Suma de dos números</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; }
        .card { border: 1px solid #ccc; padding: 20px; border-radius: 8px; box-shadow: 2px 2px 10px rgba(0,0,0,0.1); }
        input { display: block; margin: 10px 0; padding: 8px; width: 200px; }
        button { background-color: #007bff; color: white; border: none; padding: 10px; width: 100%; cursor: pointer; border-radius: 4px; }
        button:hover { background-color: #0056b3; }
        #resultado { margin-top: 15px; font-weight: bold; color: #28a745; }
    </style>
</head>
<body>

<div class="card">
    <h3>Sumadora HTML</h3>
    <input type="number" id="num1" placeholder="Primer número">
    <input type="number" id="num2" placeholder="Segundo número">
    <button onclick="sumar()">Calcular Suma</button>
    
    <div id="resultado">Resultado: </div>
</div>

<script>
    function sumar() {
        // Obtenemos los valores de los inputs
        const n1 = parseFloat(document.getElementById('num1').value);
        const n2 = parseFloat(document.getElementById('num2').value);

        // Validamos que sean números y no estén vacíos
        if (isNaN(n1) || isNaN(n2)) {
            document.getElementById('resultado').innerText = "Por favor, ingresa ambos números.";
            return;
        }

        // Realizamos la operación
        const suma = n1 + n2;

        // Mostramos el resultado
        document.getElementById('resultado').innerText = "Resultado: " + suma;
    }
</script>

</body>
</html>
